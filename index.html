<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edirears Followers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="Edirear.png">

<style>
body { margin: 0; background: #000; color: white; font-family: Arial; text-align: center; padding: 20px; }
h1 { color: #00ff6a; font-size: 2.5rem; margin-top: 10px; }
.btn { background: #00ff6a; color: black; padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; margin: 10px; }
.btn:hover { transform: scale(1.05); background: #00d65a; }
#dataBox { margin-top: 25px; text-align: left; background: #111; padding: 20px; border-radius: 12px; max-width: 800px; margin-left: auto; margin-right: auto; display: none; }
.section-title { color: #00ff6a; padding-bottom: 10px; font-size: 22px; border-bottom: 2px solid #00ff6a; }
.item { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; }
.video-thumbnail { width: 120px; height: 68px; object-fit: cover; border-radius: 5px; }
.channel-logo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
.tabs { display: flex; justify-content: center; margin: 20px 0; }
.tab { padding: 10px 20px; background: #222; color: white; border: none; cursor: pointer; margin: 0 5px; border-radius: 5px; }
.tab.active { background: #00ff6a; color: black; }
.content-section { display: none; }
.content-section.active { display: block; }
.user-profile { display: flex; align-items: center; gap: 15px; background: rgba(0,255,106,0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
.user-avatar { width: 60px; height: 60px; border-radius: 50%; }
.logout-btn { background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 8px 15px; border-radius: 5px; margin-left: auto; cursor: pointer; }
</style>

</head>
<body>

<h1>Edirears Followers</h1>

<div id="loginSection">
    <button class="btn" onclick="googleLogin()">Sign in with Google</button>
</div>

<div id="dataBox">
    <div id="userProfile" class="user-profile"></div>

    <div class="tabs">
        <button class="tab active" onclick="showSection('watchHistorySection')">Watch History</button>
        <button class="tab" onclick="showSection('subscribedChannelsSection')">Subscribed Channels</button>
    </div>

    <div id="watchHistorySection" class="content-section active">
        <h2 class="section-title">YouTube Watch History</h2>
        <div id="watchHistory"></div>
    </div>

    <div id="subscribedChannelsSection" class="content-section">
        <h2 class="section-title">Subscribed Channels</h2>
        <div id="subscribedChannels"></div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
// GOOGLE KEYS
const CLIENT_ID = "380562358749-c6i173feb8aaa0c36rlp6knjt1v6i3mk.apps.googleusercontent.com";
const API_KEY = "AIzaSyAiq3RJkLkF1SL9TBy-Rw_VOW6CWh_XHbU";

// SCOPES
const SCOPES = [
    "https://www.googleapis.com/auth/youtube.readonly",
    "https://www.googleapis.com/auth/youtube.force-ssl",
    "https://www.googleapis.com/auth/userinfo.email",
    "https://www.googleapis.com/auth/userinfo.profile"
].join(" ");

let access_token = null;

// AUTO LOGIN IF TOKEN EXISTS
window.onload = () => {
    const savedToken = localStorage.getItem("yt_token");
    const savedUser = localStorage.getItem("yt_user");

    if (savedToken && savedUser) {
        access_token = savedToken;
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("dataBox").style.display = "block";

        displayUserProfile(JSON.parse(savedUser));
        getWatchHistory();
        getSubscribedChannels();
    }
};

// LOGIN
function googleLogin() {
    google.accounts.oauth2.initCodeClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        ux_mode: "popup",
        callback: exchangeCode
    }).requestCode();
}

// TOKEN EXCHANGE
async function exchangeCode(response) {
    const res = await fetch("https://oauth2.googleapis.com/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body:
            `code=${response.code}` +
            `&client_id=${CLIENT_ID}` +
            `&client_secret=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` +
            `&redirect_uri=postmessage` +
            `&grant_type=authorization_code`
    });

    const data = await res.json();
    access_token = data.access_token;

    localStorage.setItem("yt_token", access_token);
    getUserInfo();

    document.getElementById("loginSection").style.display = "none";
    document.getElementById("dataBox").style.display = "block";

    getWatchHistory();
    getSubscribedChannels();
}

// USER PROFILE
async function getUserInfo() {
    const res = await fetch("https://www.googleapis.com/oauth2/v2/userinfo", {
        headers: { Authorization: "Bearer " + access_token }
    });
    const user = await res.json();

    localStorage.setItem("yt_user", JSON.stringify(user));
    displayUserProfile(user);
}

function displayUserProfile(user) {
    document.getElementById("userProfile").innerHTML = `
        <img src="${user.picture}" class="user-avatar">
        <div>
            <div style="font-weight:bold;font-size:1.2rem">${user.name}</div>
            <div style="color:#aaa">${user.email}</div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    `;
}

// LOGOUT
function logout() {
    localStorage.removeItem("yt_token");
    localStorage.removeItem("yt_user");
    location.reload();
}

// ⭐⭐⭐ WATCH HISTORY — FIXED ⭐⭐⭐
async function getWatchHistory() {
    const box = document.getElementById("watchHistory");
    box.innerHTML = "<div class='loading'>Loading watch history...</div>";

    try {
        const res = await fetch(
            `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=HL&maxResults=25&key=${API_KEY}`,
            { headers: { Authorization: "Bearer " + access_token } }
        );

        const data = await res.json();
        box.innerHTML = "";

        if (!data.items || data.items.length === 0) {
            box.innerHTML = "<div class='item'>Watch history is empty.</div>";
            return;
        }

        data.items.forEach(item => {
            const snippet = item.snippet;
            const thumb = snippet.thumbnails.medium.url;

            box.innerHTML += `
                <div class="item">
                    <img src="${thumb}" class="video-thumbnail">
                    <div>
                        <div class="video-title">${snippet.title}</div>
                        <div class="video-duration">Channel: ${snippet.channelTitle}</div>
                    </div>
                </div>
            `;
        });
    } catch (e) {
        box.innerHTML = "<div class='error'>Error loading history.</div>";
    }
}

// SUBSCRIPTIONS
async function getSubscribedChannels() {
    const box = document.getElementById("subscribedChannels");
    box.innerHTML = "<div class='loading'>Loading subscribed channels...</div>";

    try {
        const res = await fetch(
            `https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=20&key=${API_KEY}`,
            { headers: { Authorization: "Bearer " + access_token } }
        );

        const data = await res.json();
        box.innerHTML = "";

        if (!data.items || data.items.length === 0) {
            box.innerHTML = "<div class='item'>No subscriptions found.</div>";
            return;
        }

        data.items.forEach(item => {
            const channelId = item.snippet.resourceId.channelId;
            const logo = item.snippet.thumbnails.default.url;

            box.innerHTML += `
                <div class="item">
                    <img src="${logo}" class="channel-logo">
                    <div>
                        <div class="channel-name">${item.snippet.title}</div>
                    </div>
                </div>
            `;
        });

    } catch (error) {
        box.innerHTML = "<div class='error'>Error loading subscriptions.</div>";
    }
}

// TAB SWITCHING
function showSection(id) {
    document.querySelectorAll(".content-section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

    document.getElementById(id).classList.add("active");
    event.target.classList.add("active");
}
</script>

</body>
</html>
