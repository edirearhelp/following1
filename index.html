<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edirears Followers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Edirear.png">

<style>
    body {
        margin: 0;
        background: #000;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
    }

    h1 {
        color: #00ff6a;
        margin-top: 10px;
        font-size: 2.5rem;
    }

    .btn {
        background: #00ff6a;
        color: black;
        padding: 12px 25px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-size: 18px;
        font-weight: bold;
        transition: 0.3s;
        margin: 10px;
    }

    .btn:hover {
        transform: scale(1.05);
        background: #00d65a;
    }

    #dataBox {
        margin-top: 25px;
        text-align: left;
        background: #111;
        padding: 20px;
        border-radius: 12px;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
        display: none;
    }

    .section-title {
        color: #00ff6a;
        margin-top: 25px;
        font-size: 22px;
        border-bottom: 2px solid #00ff6a;
        padding-bottom: 10px;
    }

    .item {
        padding: 15px;
        border-bottom: 1px solid #222;
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .channel-logo {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        object-fit: cover;
    }

    .video-thumbnail {
        width: 120px;
        height: 68px;
        object-fit: cover;
        border-radius: 5px;
    }

    .channel-info, .video-info {
        flex: 1;
    }

    .channel-name {
        font-weight: bold;
        margin-bottom: 5px;
    }

    .subscriber-count {
        color: #aaa;
        font-size: 0.9rem;
    }

    .video-title {
        font-weight: bold;
        margin-bottom: 5px;
    }

    .video-duration {
        color: #aaa;
        font-size: 0.9rem;
    }

    .loading {
        text-align: center;
        padding: 20px;
        color: #00ff6a;
    }

    .error {
        color: #ff4444;
        padding: 10px;
        background: rgba(255, 68, 68, 0.1);
        border-radius: 5px;
        margin: 10px 0;
    }

    .tabs {
        display: flex;
        justify-content: center;
        margin: 20px 0;
    }

    .tab {
        padding: 10px 20px;
        background: #222;
        color: white;
        border: none;
        cursor: pointer;
        margin: 0 5px;
        border-radius: 5px;
        transition: 0.3s;
    }

    .tab.active {
        background: #00ff6a;
        color: black;
    }

    .content-section {
        display: none;
    }

    .content-section.active {
        display: block;
    }
    
    .user-profile {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
        padding: 15px;
        background: rgba(0, 255, 106, 0.1);
        border-radius: 10px;
    }
    
    .user-avatar {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
    }
    
    .user-details {
        text-align: left;
    }
    
    .user-name {
        font-weight: bold;
        font-size: 1.2rem;
        margin-bottom: 5px;
    }
    
    .user-email {
        color: #aaa;
    }
    
    .logout-btn {
        background: transparent;
        color: #ff4444;
        border: 1px solid #ff4444;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
        margin-left: auto;
    }
    
    .logout-btn:hover {
        background: rgba(255, 68, 68, 0.1);
    }
</style>
</head>

<body>

<h1>Edirears Followers</h1>

<div id="loginSection">
    <button class="btn" onclick="googleLogin()">Sign in with Google</button>
</div>

<div id="dataBox">
    <div id="userProfile" class="user-profile">
        <!-- User profile will be inserted here -->
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showSection('watchHistorySection')">Watch History</button>
        <button class="tab" onclick="showSection('subscribedChannelsSection')">Subscribed Channels</button>
    </div>

    <div id="watchHistorySection" class="content-section active">
        <h2 class="section-title">YouTube Watch History</h2>
        <div id="watchHistory"></div>
    </div>

    <div id="subscribedChannelsSection" class="content-section">
        <h2 class="section-title">Subscribed Channels</h2>
        <div id="subscribedChannels"></div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
// YOUR KEYS
const CLIENT_ID = "380562358749-c6i173feb8aaa0c36rlp6knjt1v6i3mk.apps.googleusercontent.com";
const API_KEY = "AIzaSyAiq3RJkLkF1SL9TBy-Rw_VOW6CWh_XHbU";

// REQUIRED SCOPES
const SCOPES = [
    "https://www.googleapis.com/auth/youtube.readonly",
    "https://www.googleapis.com/auth/userinfo.profile",
    "https://www.googleapis.com/auth/userinfo.email",
    "https://www.googleapis.com/auth/youtube.force-ssl"
].join(" ");

// Token store
let access_token = null;

// Check for saved token on page load
window.onload = function() {
    const savedToken = localStorage.getItem('youtube_access_token');
    const savedUser = localStorage.getItem('youtube_user_info');
    
    if (savedToken && savedUser) {
        access_token = savedToken;
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("dataBox").style.display = "block";
        
        // Display user profile
        const user = JSON.parse(savedUser);
        displayUserProfile(user);
        
        // Load data
        getWatchHistory();
        getSubscribedChannels();
    }
};

// Google Sign-In popup
function googleLogin() {
    google.accounts.oauth2.initCodeClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        ux_mode: "popup",
        callback: loadToken
    }).requestCode();
}

// Exchange "code" → "token"
async function loadToken(response) {
    try {
        const res = await fetch("https://oauth2.googleapis.com/token", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body:
                `code=${response.code}` +
                `&client_id=${CLIENT_ID}` +
                `&client_secret=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` +
                `&grant_type=authorization_code` +
                `&redirect_uri=postmessage`
        });

        const data = await res.json();
        access_token = data.access_token;
        
        // Save token to localStorage
        localStorage.setItem('youtube_access_token', access_token);

        document.getElementById("loginSection").style.display = "none";
        document.getElementById("dataBox").style.display = "block";

        getUserInfo();
        getWatchHistory();
        getSubscribedChannels();
    } catch (error) {
        console.error("Token exchange error:", error);
        alert("Error during authentication. Please try again.");
    }
}

// Fetch User Profile
async function getUserInfo() {
    try {
        const res = await fetch(
            "https://www.googleapis.com/oauth2/v2/userinfo",
            { headers: { Authorization: "Bearer " + access_token } }
        );
        const user = await res.json();
        
        // Save user info to localStorage
        localStorage.setItem('youtube_user_info', JSON.stringify(user));
        
        displayUserProfile(user);
    } catch (error) {
        console.error("Error fetching user info:", error);
        document.getElementById("userProfile").innerHTML = `
            <div class="error">Failed to load user information.</div>
        `;
    }
}

// Display user profile
function displayUserProfile(user) {
    document.getElementById("userProfile").innerHTML = `
        <img src="${user.picture}" alt="Profile Picture" class="user-avatar">
        <div class="user-details">
            <div class="user-name">${user.name}</div>
            <div class="user-email">${user.email}</div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    `;
}

// Logout function
function logout() {
    localStorage.removeItem('youtube_access_token');
    localStorage.removeItem('youtube_user_info');
    access_token = null;
    
    document.getElementById("dataBox").style.display = "none";
    document.getElementById("loginSection").style.display = "block";
    document.getElementById("userProfile").innerHTML = "";
    document.getElementById("watchHistory").innerHTML = "";
    document.getElementById("subscribedChannels").innerHTML = "";
}

// Fetch Watch History - FIXED VERSION
async function getWatchHistory() {
    const box = document.getElementById("watchHistory");
    box.innerHTML = "<div class='loading'>Loading watch history...</div>";
    
    try {
        // Get the user's actual watch history
        const res = await fetch(
            `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics&myRating=like&maxResults=20&key=${API_KEY}`,
            {
                headers: { Authorization: "Bearer " + access_token }
            }
        );

        const data = await res.json();
        box.innerHTML = "";

        if (!data.items || data.items.length === 0) {
            // If no liked videos, try to get recently watched videos another way
            box.innerHTML = "<div class='item'>No recent watch history found. Try watching some videos first.</div>";
            return;
        }

        data.items.forEach(video => {
            const thumbnailUrl = video.snippet.thumbnails.medium ? 
                video.snippet.thumbnails.medium.url : 
                video.snippet.thumbnails.default.url;
                
            box.innerHTML += `
                <div class="item">
                    <img src="${thumbnailUrl}" alt="Thumbnail" class="video-thumbnail">
                    <div class="video-info">
                        <div class="video-title">${video.snippet.title}</div>
                        <div class="video-duration">Channel: ${video.snippet.channelTitle}</div>
                    </div>
                </div>
            `;
        });
    } catch (error) {
        console.error("Error fetching watch history:", error);
        box.innerHTML = "<div class='error'>Failed to load watch history. Please try again.</div>";
    }
}

// Fetch Subscribed Channels
async function getSubscribedChannels() {
    const box = document.getElementById("subscribedChannels");
    box.innerHTML = "<div class='loading'>Loading subscribed channels...</div>";
    
    try {
        const res = await fetch(
            `https://www.googleapis.com/youtube/v3/subscriptions?part=snippet,subscriberSnippet&mine=true&maxResults=20&key=${API_KEY}`,
            { headers: { Authorization: "Bearer " + access_token } }
        );

        const data = await res.json();
        box.innerHTML = "";

        if (!data.items || data.items.length === 0) {
            box.innerHTML = "<div class='item'>No subscriptions found.</div>";
            return;
        }

        // Get channel IDs for additional details
        const channelIds = data.items.map(item => item.snippet.resourceId.channelId);

        // Fetch channel details (for subscriber counts and logos)
        const channelsRes = await fetch(
            `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelIds.join(',')}&key=${API_KEY}`,
            { headers: { Authorization: "Bearer " + access_token } }
        );

        const channelsData = await channelsRes.json();
        const channelsMap = {};
        
        if (channelsData.items) {
            channelsData.items.forEach(channel => {
                channelsMap[channel.id] = {
                    logo: channel.snippet.thumbnails.default.url,
                    subscribers: formatSubscribers(channel.statistics.subscriberCount)
                };
            });
        }

        data.items.forEach(item => {
            const channelId = item.snippet.resourceId.channelId;
            const channelInfo = channelsMap[channelId] || {
                logo: "",
                subscribers: "Unknown"
            };
            
            box.innerHTML += `
                <div class="item">
                    <img src="${channelInfo.logo}" alt="Channel Logo" class="channel-logo">
                    <div class="channel-info">
                        <div class="channel-name">${item.snippet.title}</div>
                        <div class="subscriber-count">${channelInfo.subscribers} subscribers</div>
                    </div>
                </div>
            `;
        });
    } catch (error) {
        console.error("Error fetching subscribed channels:", error);
        box.innerHTML = "<div class='error'>Failed to load subscribed channels. Please try again.</div>";
    }
}

// Helper function to format subscriber counts
function formatSubscribers(count) {
    if (!count) return "0";
    
    const num = parseInt(count);
    if (num >= 1000000) {
        return (num / 1000000).toFixed(1) + "M";
    } else if (num >= 1000) {
        return (num / 1000).toFixed(1) + "K";
    }
    return num.toString();
}

// Tab navigation
function showSection(sectionId) {
    // Hide all sections
    document.querySelectorAll('.content-section').forEach(section => {
        section.classList.remove('active');
    });
    
    // Remove active class from all tabs
    document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
    });
    
    // Show selected section
    document.getElementById(sectionId).classList.add('active');
    
    // Activate corresponding tab
    event.target.classList.add('active');
}
</script>

</body>
</html>
